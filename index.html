<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">

<body>

    <div class="container" id="cover">

    </div>

    <div class="container hidden" id="content">
        <!-- Bagian Nama Tamu yang akan berubah otomatis -->

            <div class="box"><span id="minutes">0</span>Menit</div>
            <div class="box"><span id="seconds">0</span>Detik</div>
        </div>
        <div class="event-details">
            <p><strong>Hari/Tanggal:</strong> Kamis, 02 Juli 2026</p>
            <p><strong>Waktu:</strong> 09.00 WITA</p>
            <p><strong>Lokasi:</strong> Ds. Pengambaw Hilir Dalam, Kec. Haruyan</p>
        </div>
        <a href="https://www.google.com/maps/place/2%C2%B042'00.6%22S+115%C2%B019'58.8%22E/@-2.7002146,115.3329574,3a,75y,43.07h,90t/data=!3m7!1e1!3m5!1sSE0kxNZd6H_pR1ymzi657w!2e0!6shttps:%2F%2Fstreetviewpixels-pa.googleapis.com%2Fv1%2Fthumbnail%3Fcb_client%3Dmaps_sv.tactile%26w%3D900%26h%3D600%26pitch%3D0%26panoid%3DSE0kxNZd6H_pR1ymzi657w%26yaw%3D43.068966!7i16384!8i8192!4m4!3m3!8m2!3d-2.700167!4d115.333006?entry=ttu&g_ep=EgoyMDI2MDYxNi4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn btn-maps">Lihat Lokasi</a>
    </div>

    <audio id="myAudio" loop>
        <source src="lagu.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</html>
